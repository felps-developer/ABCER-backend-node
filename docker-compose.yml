services:

  postgres:
    image: postgres:16-alpine
    container_name: abcer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-abcer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abcer}
      POSTGRES_DB: abcerDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-abcer} -d abcerDB"]
      interval: 5s
      timeout: 5s
      retries: 10

  node-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: abcer-node-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-abcer}:${POSTGRES_PASSWORD:-abcer}@postgres:5432/abcerDB?schema=abcer
      PORT: 3000
      RECAPTCHA_BYPASS: "true"
      SITE_URL: http://localhost:3000
    ports:
      - "3001:3000"
    volumes:
      - uploads_data:/app/uploads
    command: ["node", "dist/src/main.js"]

volumes:
  postgres_data:
  uploads_data:
